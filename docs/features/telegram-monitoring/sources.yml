version: 1

# Canonical Telegram sources for monitoring (prod/test).
#
# Fields:
# - username: Telegram @username (stored normalized: lowercase, no @, no url)
# - trust_level: low|medium|high
# - default_location: optional (used if post omits venue/address)
# - festival_series: optional; if set -> telegram_source.festival_source=1
# - filters: optional dict of booleans (server-side filters)
#   - skip_recurring_excursions: drops "ежедневные/каждый день" экскурсии
#   - skip_esoterica: drops эзотерика/таро/астрология/etc
#   - skip_ads: drops posts with явной маркировкой рекламы (#реклама)
#   - bridge_notice_daily: for @klgdcity развод/разводка мостов -> extract event + post notice to /daily channels
# - notes: optional free text (not used by code)

sources:
